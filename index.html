<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港行程預約系統 (Cloud Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK (模組化版本) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- 重要：請在這裡貼上您的 Firebase 設定 ---
        const firebaseConfig = {
  apiKey: "AIzaSyDoufkPhmvXiAaJHWbLEViU6vFTwn54NNE",
  authDomain: "taxitravelpawgo.firebaseapp.com",
  projectId: "taxitravelpawgo",
  storageBucket: "taxitravelpawgo.firebasestorage.app",
  messagingSenderId: "58055344894",
  appId: "1:58055344894:web:d443a0447b651fea901baf",
  measurementId: "G-QYMEQHSDMQ"
};-------------------------------------------

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'appointments');

        // UI 邏輯
        window.addEventListener('DOMContentLoaded', () => {
            const hkBookingForm = document.getElementById('hkBookingForm');
            const adminList = document.getElementById('adminList');
            const noData = document.getElementById('noData');
            const secretTrigger = document.getElementById('secretTrigger');
            
            // 監聽雲端數據變化 (管理員用)
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                renderAdminTable(data);
            });

            // 提交預約到 Firebase
            hkBookingForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                btn.disabled = true;
                btn.innerText = "提交中...";

                const startD = document.getElementById('startDistrict').value;
                const endD = document.getElementById('endDistrict').value;

                const newApp = {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value,
                    route: `${startD} ${document.getElementById('startAddr').value} ➜ ${endD} ${document.getElementById('endAddr').value}`,
                    status: '待處理',
                    timestamp: Date.now()
                };

                try {
                    await push(dbRef, newApp);
                    hkBookingForm.reset();
                    document.getElementById('successPop').classList.remove('hidden');
                } catch (err) {
                    alert('提交失敗，請檢查網路連接或 Firebase 設定');
                } finally {
                    btn.disabled = false;
                    btn.innerText = "立即預約";
                }
            });

            // 管理員渲染邏輯
            function renderAdminTable(data) {
                if (!data) {
                    adminList.innerHTML = '';
                    noData.classList.remove('hidden');
                    document.getElementById('count').innerText = 0;
                    return;
                }
                noData.classList.add('hidden');
                
                const items = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                items.sort((a, b) => b.timestamp - a.timestamp); // 最新優先
                
                document.getElementById('count').innerText = items.length;
                adminList.innerHTML = items.map(a => `
                    <tr class="text-sm border-b border-slate-50">
                        <td class="px-6 py-4">
                            <div class="font-bold">${a.date}</div>
                            <div class="text-[10px] text-blue-500 font-mono">${a.time}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-medium text-slate-700">${a.name}</div>
                            <div class="text-xs text-slate-400">${a.phone}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-[10px] text-slate-500 max-w-[200px]">${a.route}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold ${a.status === '已確認' ? 'bg-green-100 text-green-600' : 'bg-blue-50 text-blue-500'}">${a.status}</span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-1">
                            <button onclick="window.confirmBooking('${a.id}')" class="text-[10px] bg-slate-100 px-2 py-1 rounded hover:bg-green-500 hover:text-white transition">確認</button>
                            <button onclick="window.deleteBooking('${a.id}')" class="text-[10px] bg-slate-100 px-2 py-1 rounded hover:bg-red-500 hover:text-white transition">刪除</button>
                        </td>
                    </tr>
                `).join('');
            }

            // 全域管理函數
            window.deleteBooking = (id) => {
                if(confirm('確定永久刪除？')) remove(ref(db, `appointments/${id}`));
            };
            window.confirmBooking = (id) => {
                update(ref(db, `appointments/${id}`), { status: '已確認' });
            };

            // 隱藏入口 (連點 5 次)
            let clicks = 0;
            let lastClick = 0;
            secretTrigger.addEventListener('click', () => {
                const now = Date.now();
                if(now - lastClick < 500) clicks++; else clicks = 1;
                lastClick = now;
                if(clicks === 5) {
                    clicks = 0;
                    document.getElementById('loginModal').classList.remove('hidden');
                }
            });
        });

        // 普通 UI 函數 (非模組化)
        window.closeLogin = () => document.getElementById('loginModal').classList.add('hidden');
        window.verifyPass = () => {
            const pass = document.getElementById('adminPass').value;
            if(pass === '8888') {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('userSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                document.getElementById('navTitle').innerText = '管理控制台';
            } else {
                alert('密鑰錯誤');
            }
        };
        window.logoutAdmin = () => location.reload();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; background: #f8fafc; }
        .hk-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .dashed-line { position: absolute; left: 10px; top: 24px; bottom: 4px; width: 2px; border-left: 2px dashed #cbd5e1; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-default" id="secretTrigger">
                <div class="w-10 h-10 rounded-xl hk-blue flex items-center justify-center text-white shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                </div>
                <span class="font-bold text-lg text-slate-800" id="navTitle">行程預約服務 (雲端版)</span>
            </div>
            <div class="text-[10px] text-slate-300">CONNECTED TO FIREBASE</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="userSection">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                <div class="hk-blue p-8 text-white">
                    <h2 class="text-2xl font-bold">預約您的行程</h2>
                    <p class="text-blue-100 text-sm opacity-80 mt-1">資料將同步至雲端，專員會即時收到通知</p>
                </div>
                <form id="hkBookingForm" class="p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block text-sm font-bold mb-2">聯絡人姓名</label><input type="text" id="name" required class="w-full px-4 py-3 border rounded-xl" placeholder="陳大文"></div>
                        <div><label class="block text-sm font-bold mb-2">香港電話</label><input type="tel" id="phone" pattern="[2-9][0-9]{7}" required class="w-full px-4 py-3 border rounded-xl" placeholder="91234567"></div>
                        <div><label class="block text-sm font-bold mb-2">日期</label><input type="date" id="date" required class="w-full px-4 py-3 border rounded-xl"></div>
                        <div><label class="block text-sm font-bold mb-2">時間</label><input type="time" id="time" required class="w-full px-4 py-3 border rounded-xl"></div>
                    </div>
                    <div class="space-y-4 bg-slate-50 p-6 rounded-2xl">
                        <div class="relative pl-8"><div class="dashed-line"></div><div class="absolute left-0 top-1 w-5 h-5 rounded-full bg-emerald-500 border-4 border-white"></div><select id="startDistrict" required class="w-full p-2 mb-2 border rounded-lg text-sm"><option value="">選擇起點區域</option><option>中西區</option><option>油尖旺區</option><option>荃灣區</option><option>沙田區</option><option>西貢區</option></select><input type="text" id="startAddr" required class="w-full p-3 border rounded-xl text-sm" placeholder="詳細地址"></div>
                        <div class="relative pl-8"><div class="absolute left-0 top-1 w-5 h-5 rounded-full bg-red-500 border-4 border-white"></div><select id="endDistrict" required class="w-full p-2 mb-2 border rounded-lg text-sm"><option value="">選擇終點區域</option><option>中西區</option><option>油尖旺區</option><option>荃灣區</option><option>沙田區</option><option>西貢區</option></select><input type="text" id="endAddr" required class="w-full p-3 border rounded-xl text-sm" placeholder="詳細地址"></div>
                    </div>
                    <button type="submit" class="w-full hk-blue text-white font-bold py-4 rounded-xl text-lg shadow-lg">立即預約</button>
                </form>
            </div>
        </div>

        <div id="adminSection" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border flex justify-between items-center">
                <div><h2 class="text-xl font-bold">管理後台 (Cloud Live)</h2><p class="text-xs text-slate-400">總計筆數: <span id="count">0</span></p></div>
                <button onclick="logoutAdmin()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold">登出系統</button>
            </div>
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-bold uppercase text-slate-400"><tr class="px-6 py-4"><th class="px-6 py-4">時間</th><th class="px-6 py-4">客戶</th><th class="px-6 py-4">路線</th><th class="px-6 py-4">狀態</th><th class="px-6 py-4 text-right">管理</th></tr></thead>
                    <tbody id="adminList"></tbody>
                </table>
                <div id="noData" class="py-20 text-center hidden text-slate-300">尚無雲端數據</div>
            </div>
        </div>
    </main>

    <!-- 驗證彈窗 -->
    <div id="loginModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-3xl p-8 max-w-xs w-full"><h3 class="text-center font-bold mb-6">後台身份驗證</h3><input type="password" id="adminPass" class="w-full p-3 border rounded-xl text-center tracking-[1em] mb-4" placeholder="••••"><div class="grid grid-cols-2 gap-3"><button onclick="closeLogin()" class="bg-slate-100 py-3 rounded-xl font-bold">取消</button><button onclick="verifyPass()" class="bg-slate-800 py-3 rounded-xl font-bold text-white">確認</button></div></div>
    </div>

    <!-- 成功彈窗 -->
    <div id="successPop" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] p-6">
        <div class="bg-white rounded-3xl p-10 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
            <h3 class="text-xl font-bold mb-2 text-slate-800">雲端提交成功</h3>
            <p class="text-slate-500 text-sm mb-6">預約資料已成功同步到管理後台。</p>
            <button onclick="document.getElementById('successPop').classList.add('hidden')" class="w-full hk-blue text-white py-3 rounded-xl font-bold">完成</button>
        </div>
    </div>
</body>
</html>
